name: Build and Deploy to Cloud Run (v0.0.1)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: finai-app
  GAR_LOCATION: us-central1-docker.pkg.dev
  INSTANCE_CONN_NAME: ${{ secrets.GCP_INSTANCE_CONN_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/finai/app:${{ github.sha }} -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/finai/app:latest -f backend/Dockerfile .
        docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/finai/app:${{ github.sha }}
        docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/finai/app:latest

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE_NAME }}
        region: ${{ env.REGION }}
        image: ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/finai/app:${{ github.sha }}
        flags: |
          --add-cloudsql-instances=${{ env.INSTANCE_CONN_NAME }}
        secrets: |
          DATABASE_URL=DATABASE_URL:latest
          READONLY_DATABASE_URL=READONLY_DATABASE_URL:latest
          GEMINI_API_KEY=GEMINI_API_KEY:latest
          GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest
